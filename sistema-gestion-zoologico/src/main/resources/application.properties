spring.application.name=sistema-gestion-zoologico
server.port=8002

spring.datasource.url=jdbc:mysql://localhost:3306/gestor-zoologico?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

logging.level.org.springframework.security=INFO
logging.level.com.edu.politecnicointernacional=INFO